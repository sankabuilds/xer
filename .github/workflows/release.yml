name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build project
        run: cargo build --release

      - name: Package release artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release | Out-Null
          Copy-Item target\release\xer.exe release\xer.exe
          Compress-Archive -Path release\xer.exe -DestinationPath xer-${{ github.ref_name }}-windows.zip

      - name: Package release artifact (Linux/macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p release
          cp target/release/xer release/
          tar -czf xer-${{ github.ref_name }}-${{ matrix.os }}.tar.gz -C release xer

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: xer-release-${{ github.ref_name }}-${{ matrix.os }}
          path: |
            xer-${{ github.ref_name }}-${{ matrix.os }}.tar.gz
            xer-${{ github.ref_name }}-windows.zip
          if-no-files-found: ignore
